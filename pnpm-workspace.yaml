packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@next/env@16.2.7'
  - '@next/eslint-plugin-next@16.2.7'
  - '@next/mdx@16.2.7'
  - '@next/swc-darwin-arm64@16.2.7'
  - '@next/swc-darwin-x64@16.2.7'
  - '@next/swc-linux-arm64-gnu@16.2.7'
  - '@next/swc-linux-arm64-musl@16.2.7'
  - '@next/swc-linux-x64-gnu@16.2.7'
  - '@next/swc-linux-x64-musl@16.2.7'
  - '@next/swc-win32-arm64-msvc@16.2.7'
  - '@next/swc-win32-x64-msvc@16.2.7'
  - eslint-config-next@16.2.7
  - next@16.2.7

overrides:
  '@xmldom/xmldom': 0.9.10
  # Pin zod: nextra-theme-docs@4.6.1's LayoutPropsSchema requires `children`,
  # but the Layout strips it before validating. zod >= 4.2 enforces this and
  # breaks the production build. Remove once nextra fixes the schema.
  zod: 4.1.12
